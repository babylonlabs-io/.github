name: Reusable Go Build, Lint, and Test Workflow

on:
  workflow_call:
    inputs:
      go-version:
        description: 'Go version'
        type: string
        default: '1.22.3'
      go-lint-version:
        description: 'Go Lint version'
        type: string
        default: 'v1.59'
      install-dependencies-command:
        description: 'Command to install dependencies'
        required: false
        type: string
      run-lint:
        description: 'Run lint'
        type: boolean
        default: false
      run-unit-tests:
        description: 'Run unit tests'
        type: boolean
        default: false
      run-integration-tests:
        description: 'Run integration tests'
        type: boolean
        default: false
      integration-tests-docker-auth:
        description: 'Authenticate with Docker on integration tests'
        type: boolean
        default: false
      # allow customizing the test command (e.g sudo make test-e2e)
      integration-tests-command:
        description: 'Command to run integration tests'
        required: false
        type: string
        default: 'make test-e2e'
      run-check-mock-gen:
        description: 'Run check-mock-gen'
        type: boolean
        default: false
      run-build:
        description: 'Run build'
        type: boolean
        default: false
      run-gosec:
        description: 'Run GoSec'
        type: boolean
        default: false
      gosec-args:
        description: 'Arguments when running gosec'
        required: false
        type: string
        default: './...'
      go-private-repos-authentication:
        description: 'Enable authentication for private repositories'
        type: boolean
        default: false
      testdata-url:
        description: 'Optional URL to the test data file for unit tests'
        required: false
        type: string
      testdata-path:
        description: 'Optional path where the test data file for unit tests should be placed'
        required: false
        type: string
        default: testdata.json

permissions: {}

jobs:
  build:
    permissions:
      contents: read
    runs-on: ubuntu-24.04
    if: ${{ inputs.run-build }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2 https://github.com/actions/checkout/releases/tag/v6.0.2
      - name: Set up Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5 https://github.com/actions/setup-go/releases/tag/v5
        with:
          go-version: ${{ inputs.go-version }}

      - name: Configure Private Module Access
        if: ${{ inputs.go-private-repos-authentication }}
        env:
          GO_PRIVATE_TOKEN: ${{ secrets.GO_PRIVATE_TOKEN }}
        run: |
          git config --global url."https://${GO_PRIVATE_TOKEN}@github.com/".insteadOf "https://github.com/"

      - name: Print Go environment
        run: go env

      - name: Cache Go modules
        id: go-cache
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4 https://github.com/actions/cache/releases/tag/v4
        with:
          path: |
            ~/.go/pkg/mod
            ~/.cache/go-build
          key: go-mod-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            go-mod-

      - name: Install Dependencies
        if: ${{ inputs.install-dependencies-command != '' }}
        env:
          INSTALL_CMD: ${{ inputs.install-dependencies-command }}
        run: eval "$INSTALL_CMD"

      - name: Build Application
        run: make build

  lint:
    permissions:
      contents: read
    runs-on: ubuntu-24.04
    if: ${{ inputs.run-lint }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2 https://github.com/actions/checkout/releases/tag/v6.0.2
      - name: Set up Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5 https://github.com/actions/setup-go/releases/tag/v5
        with:
          go-version: ${{ inputs.go-version }}

      - name: Configure Private Module Access
        if: ${{ inputs.go-private-repos-authentication }}
        env:
          GO_PRIVATE_TOKEN: ${{ secrets.GO_PRIVATE_TOKEN }}
        run: |
          git config --global url."https://${GO_PRIVATE_TOKEN}@github.com/".insteadOf "https://github.com/"

      - name: Install Dependencies
        if: ${{ inputs.install-dependencies-command != '' }}
        env:
          INSTALL_CMD: ${{ inputs.install-dependencies-command }}
        run: eval "$INSTALL_CMD"

      - name: Run Lint
        uses: golangci/golangci-lint-action@4afd733a84b1f43292c63897423277bb7f4313a9 # v8 https://github.com/golangci/golangci-lint-action/releases/tag/v8
        with:
          version: ${{ inputs.go-lint-version }}
          args: --timeout=10m

  unit-tests:
    permissions:
      contents: read
    runs-on: ubuntu-24.04
    if: ${{ inputs.run-unit-tests }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2 https://github.com/actions/checkout/releases/tag/v6.0.2
      # Restore cache if file already cached
      - name: Restore test data cache
        if: ${{ inputs.testdata-url != '' }}
        id: cache-testdata
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4 https://github.com/actions/cache/releases/tag/v4
        with:
          path: ${{ inputs.testdata-path }}
          key: testdata-${{ inputs.testdata-url }}-${{ inputs.testdata-path }}

      # Download file if cache miss
      - name: Download test data (if cache miss)
        if: ${{ inputs.testdata-url != '' && steps.cache-testdata.outputs.cache-hit != 'true' }}
        env:
          TESTDATA_URL: ${{ inputs.testdata-url }}
          TESTDATA_PATH: ${{ inputs.testdata-path }}
        run: |
          echo "Cache miss — downloading test data from $TESTDATA_URL to $TESTDATA_PATH..."
          mkdir -p "$(dirname "$TESTDATA_PATH")"
          curl -L -o "$TESTDATA_PATH" "$TESTDATA_URL"

      - name: Set up Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5 https://github.com/actions/setup-go/releases/tag/v5
        with:
          go-version: ${{ inputs.go-version }}

      - name: Configure Private Module Access
        if: ${{ inputs.go-private-repos-authentication }}
        env:
          GO_PRIVATE_TOKEN: ${{ secrets.GO_PRIVATE_TOKEN }}
        run: |
          git config --global url."https://${GO_PRIVATE_TOKEN}@github.com/".insteadOf "https://github.com/"

      - name: Install Dependencies
        if: ${{ inputs.install-dependencies-command != '' }}
        env:
          INSTALL_CMD: ${{ inputs.install-dependencies-command }}
        run: eval "$INSTALL_CMD"

      - name: Run Unit Tests
        run: |
          make test

  integration-tests:
    permissions:
      contents: read
    runs-on: ubuntu-24.04
    if: ${{ inputs.run-integration-tests }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2 https://github.com/actions/checkout/releases/tag/v6.0.2
      - name: Login to Docker Hub
        if: ${{ inputs.integration-tests-docker-auth == 'true' }}
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3 https://github.com/docker/login-action/releases/tag/v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5 https://github.com/actions/setup-go/releases/tag/v5
        with:
          go-version: ${{ inputs.go-version }}

      - name: Configure Private Module Access
        if: ${{ inputs.go-private-repos-authentication }}
        env:
          GO_PRIVATE_TOKEN: ${{ secrets.GO_PRIVATE_TOKEN }}
        run: |
          git config --global url."https://${GO_PRIVATE_TOKEN}@github.com/".insteadOf "https://github.com/"

      - name: Install Dependencies
        if: ${{ inputs.install-dependencies-command != '' }}
        env:
          INSTALL_CMD: ${{ inputs.install-dependencies-command }}
        run: eval "$INSTALL_CMD"

      - name: Run Integration Tests
        env:
          TEST_CMD: ${{ inputs.integration-tests-command }}
        run: eval "$TEST_CMD"

  check-mock-gen:
    permissions:
      contents: read
    runs-on: ubuntu-24.04
    if: ${{ inputs.run-check-mock-gen }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2 https://github.com/actions/checkout/releases/tag/v6.0.2
      - name: Set up Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5 https://github.com/actions/setup-go/releases/tag/v5
        with:
          go-version: ${{ inputs.go-version }}

      - name: Install Dependencies
        if: ${{ inputs.install-dependencies-command != '' }}
        env:
          INSTALL_CMD: ${{ inputs.install-dependencies-command }}
        run: eval "$INSTALL_CMD"

      - name: Run make mock-gen
        run: make mock-gen

      - name: Check for uncommitted changes
        run: |
          if ! git diff --exit-code; then
            echo "Uncommitted changes detected. Please run 'make mock-gen' before committing."
            exit 1
          fi
  gosec:
    permissions:
      contents: read
    runs-on: ubuntu-24.04
    if: ${{ inputs.run-gosec }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2 https://github.com/actions/checkout/releases/tag/v6.0.2
      - name: Run Gosec Security Scanner
        uses: securego/gosec@223e19b8856e00f02cc67804499a83f77e208f3c # v2.25.0 https://github.com/securego/gosec/releases/tag/v2.25.0
        with:
          args: ${{ inputs.gosec-args }}
