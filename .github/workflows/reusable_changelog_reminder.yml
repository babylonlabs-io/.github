# adapted from https://github.com/osmosis-labs/osmosis/blob/main/.goreleaser.yaml
name: Changelog Reminder
on:
  workflow_call:
    inputs:
      run-changelog-check:
        description: 'Run changelog check'
        type: boolean
        default: true
      files-ignore:
        description: 'Files to ignore for changelog check'
        type: string
        default: |
          **/*.md
          **/*_test.go
          tests/**
          **/*.py
          .github/workflows/*.yml

permissions: {}

jobs:
  check_changelog:
    permissions:
      contents: read
      pull-requests: read
    name: Check Changelogs
    runs-on: ubuntu-24.04
    if: ${{ inputs.run-changelog-check }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2 https://github.com/actions/checkout/releases/tag/v6.0.2
      - name: Get changed files
        id: changed-files
        uses: tj-actions/changed-files@a284dc1814e3fd07f2e34267fc8f81227ed29fb8 # v45.0.8 https://github.com/tj-actions/changed-files/releases/tag/v45.0.8
        with:
          files_ignore: ${{ inputs.files-ignore }}

      - name: Changelog check
        # Skip this step and return success result for markdown only changes
        if: |
          steps.changed-files.outputs.any_changed == 'true' ||
          steps.changed-files.outputs.any_deleted == 'true' ||
          steps.changed-files.outputs.any_modified == 'true'
        uses: Zomzog/changelog-checker@09cfe9ad3618dcbfdba261adce0c41904cabb8c4 # v1.3.0 https://github.com/Zomzog/changelog-checker/releases/tag/v1.3.0
        with:
          fileName: CHANGELOG.md
          noChangelogLabel: A:no-changelog
          checkNotification: Simple
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
